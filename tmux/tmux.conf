# tmux config for the context model (Phase 4 of the dotfiles rebuild).
# Context = tmux session name; new panes inherit it via conf.d/context.zsh.

# Truecolor + sensible defaults
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
setw -g mode-keys vi

# --- status bar --------------------------------------------------------------
set -g status-interval 5
set -g status-style "bg=default"
set -g status-left-length 30
set -g status-right-length 100

# Left: the context (session name), color-coded per context.
set -g status-left "#{?#{==:#S,planetary},#[fg=black bg=red],#{?#{==:#S,currents},#[fg=black bg=green],#{?#{==:#S,ayeeye},#[fg=black bg=blue],#[fg=black bg=white]}}} #S #[default] "

# Windows: "<context> #<index>" per window; the active one gets a red asterisk.
# (###I renders a literal '#' followed by the window index.)
set -g window-status-separator " | "
set -g window-status-format "#S ###I"
set -g window-status-current-format "#S ###I #[fg=red]*#{?window_zoomed_flag,Z,}#[default]"

# Window names (list-windows, prefix+w switcher): use the working directory,
# not the running command. Default automatic-rename uses pane_current_command,
# which for Claude Code is the version binary "2.1.186". Session name (#S) does
# not resolve during the automatic-rename pass, so use the path basename.
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Right: Claude Code version + the ACTIVE git commit identity (safety rail) + clock.
set -g status-right "#[fg=colour245]#(claude --version 2>/dev/null | cut -d' ' -f1)#[default]  #[fg=yellow]#(cd '#{pane_current_path}' && git config user.email 2>/dev/null)#[default]  #[fg=cyan]%H:%M "

# --- terminal title ----------------------------------------------------------
# Name the outer Ghostty tab/window "<context> <window-index>", e.g.
# "currents 1", "currents 2". Updates as you switch tmux windows.
set -g set-titles on
set -g set-titles-string "#S #I"

# --- keys --------------------------------------------------------------------
# sesh context picker on prefix+s
bind s run-shell "sesh connect \"$(sesh list | fzf-tmux -p 60%,50%)\""
# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"
